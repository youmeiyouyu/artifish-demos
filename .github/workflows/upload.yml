name: Upload Demo

on:
  repository_dispatch:
    types: [upload]

env:
  SUPABASE_URL: https://ipohnmmfgqpaosomfscn.supabase.co
  CF_PROJECT: artifish-demos
  REPO: youmeiyouyu/artifish-demos

jobs:
  upload-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Generate filename and slug
        id: filename
        run: |
          TITLE="${{ github.event.client_payload.title }}"
          SLUG=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | head -c 50)
          FILENAME="${SLUG}-$(date +%s).html"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Upload file via GitHub API
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          # Get current file SHA if exists
          SHA=""
          RESP=$(curl -s -H "Authorization: token $PAT" \
            "https://api.github.com/repos/${{ env.REPO }}/contents/${{ steps.filename.outputs.filename }}")
          if echo "$RESP" | grep -q '"sha"'; then
            SHA=$(echo "$RESP" | grep -o '"sha":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          
          # Prepare JSON payload
          CONTENT=$(echo '${{ github.event.client_payload.html }}' | base64 -w0)
          
          if [ -z "$SHA" ]; then
            JSON="{\"message\":\"feat: add ${{ steps.filename.outputs.filename }}\",\"content\":\"$CONTENT\"}"
          else
            JSON="{\"message\":\"feat: add ${{ steps.filename.outputs.filename }}\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
          fi
          
          # Upload file
          curl -s -X PUT \
            -H "Authorization: token $PAT" \
            -H "Content-Type: application/json" \
            -d "$JSON" \
            "https://api.github.com/repos/${{ env.REPO }}/contents/${{ steps.filename.outputs.filename }}"

      - name: Wait for Cloudflare deployment
        run: sleep 25

      - name: Create Supabase record
        run: |
          curl -s -X POST "${{ env.SUPABASE_URL }}/rest/v1/works" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"title\": \"${{ steps.filename.outputs.title }}\",
              \"description\": \"${{ github.event.client_payload.description || '' }}\",
              \"tech_stack\": \"${{ github.event.client_payload.tech_stack || 'HTML' }}\",
              \"demo_url\": \"https://${{ env.CF_PROJECT }}.pages.dev/${{ steps.filename.outputs.filename }}\",
              \"code_url\": \"${{ github.event.client_payload.code_url || '' }}\",
              \"author_name\": \"${{ github.event.client_payload.author_name }}\",
              \"image_url\": \"https://${{ env.CF_PROJECT }}.pages.dev/${{ steps.filename.outputs.filename }}\"
            }"
