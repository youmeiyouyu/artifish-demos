name: Upload Demo

on:
  repository_dispatch:
    types: [upload]

env:
  SUPABASE_URL: https://ipohnmmfgqpaosomfscn.supabase.co
  CF_PROJECT: artifish-demos

jobs:
  upload-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate filename
        id: filename
        run: |
          TITLE="${{ github.event.client_payload.title }}"
          SLUG=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | head -c 50)
          FILENAME="${SLUG}-$(date +%s).html"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Save HTML file
        run: |
          echo '${{ github.event.client_payload.html }}' > "${{ steps.filename.outputs.filename }}"

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@artfish.cn"
          git config --local user.name "ArtFish Action"
          git add .
          git commit -m "feat: add ${{ steps.filename.outputs.filename }}"
          git push https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }} HEAD:main

      - name: Wait for Cloudflare deployment
        run: sleep 25

      - name: Create Supabase record
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -s -X POST "${{ env.SUPABASE_URL }}/rest/v1/works" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"title\": \"${{ steps.filename.outputs.title }}\",
              \"description\": \"${{ github.event.client_payload.description || '' }}\",
              \"tech_stack\": \"${{ github.event.client_payload.tech_stack || 'HTML' }}\",
              \"demo_url\": \"https://${{ env.CF_PROJECT }}.pages.dev/${{ steps.filename.outputs.filename }}\",
              \"code_url\": \"${{ github.event.client_payload.code_url || '' }}\",
              \"author_name\": \"${{ github.event.client_payload.author_name }}\",
              \"image_url\": \"https://${{ env.CF_PROJECT }}.pages.dev/${{ steps.filename.outputs.filename }}\"
            }"
